<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do App</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --text-primary: #e2e8f0;
      --text-secondary: #a8b2d8;
      --accent: #e94560;
      --success: #68d391;
      --warning: #f6ad55;
      --info: #63b3ed;
      --border: #2d3748;
    }

    .light {
      --bg-primary: #f0f4f8;
      --bg-secondary: #ffffff;
      --bg-card: #e2e8f0;
      --text-primary: #1a202c;
      --text-secondary: #4a5568;
      --accent: #e94560;
      --success: #38a169;
      --warning: #dd6b20;
      --info: #3182ce;
      --border: #cbd5e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.3s, color 0.3s;
    }

    body {
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .theme-toggle {
      background: var(--bg-card);
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      flex: 1;
      background: var(--bg-secondary);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat-box .number {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-box .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .progress-container {
      background: var(--bg-secondary);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--border);
      border-radius: 50px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #e94560, #68d391);
      border-radius: 50px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .input-container {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-row input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
    }

    .input-row input::placeholder {
      color: var(--text-secondary);
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 22px;
      cursor: pointer;
    }

    .priority-row {
      display: flex;
      gap: 8px;
    }

    .priority-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }

    .priority-btn.active-high {
      border-color: #e94560;
      color: #e94560;
      background: rgba(233,69,96,0.1);
    }

    .priority-btn.active-medium {
      border-color: #f6ad55;
      color: #f6ad55;
      background: rgba(246,173,85,0.1);
    }

    .priority-btn.active-low {
      border-color: #68d391;
      color: #68d391;
      background: rgba(104,211,145,0.1);
    }

    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .tasks-header h2 {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 30px;
    }

    .task-item {
      background: var(--bg-secondary);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    .task-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .task-content {
      flex: 1;
    }

    .task-text {
      font-size: 15px;
      color: var(--text-primary);
    }

    .task-text.completed {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .task-priority {
      font-size: 11px;
      margin-top: 4px;
      font-weight: 600;
    }

    .priority-high { color: #e94560; }
    .priority-medium { color: #f6ad55; }
    .priority-low { color: #68d391; }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .delete-btn:hover {
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .copyright {
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 20px 0 10px;
    }

    /* Popup */
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-box {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      max-width: 300px;
      width: 90%;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup-box .emoji {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .popup-box h2 {
      font-size: 22px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .popup-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .popup-close {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>My To-Do App</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="number" id="pendingCount">0</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-box">
      <div class="number" id="completedCount">0</div>
      <div class="label">Completed</div>
    </div>
    <div class="stat-box">
      <div class="number" id="totalCount">0</div>
      <div class="label">Total</div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
    <div class="priority-row">
      <button class="priority-btn active-high" id="btn-high" onclick="setPriority('high')">🔴 High</button>
      <button class="priority-btn" id="btn-medium" onclick="setPriority('medium')">🟡 Medium</button>
      <button class="priority-btn" id="btn-low" onclick="setPriority('low')">🟢 Low</button>
    </div>
  </div>

  <div class="tasks-header">
    <h2>Your Tasks</h2>
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="copyright">© 2025 TeaJay Konsult. All rights reserved.</div>

  <!-- Celebration Popup -->
  <div class="popup-overlay" id="celebrationPopup">
    <div class="popup-box">
      <div class="emoji">🎉</div>
      <h2>Goal Achieved!</h2>
      <p>Congratulations! You've crushed another task. Keep going, you're on fire! 🔥</p>
      <button class="popup-close" onclick="closePopup()">Thank You!</button>
    </div>
  </div>

<script>
  let tasks = JSON.parse(localStorage.getItem('teajay-tasks')) || [];
  let selectedPriority = 'high';
  let isLight = false;

  function saveTasks() {
    localStorage.setItem('teajay-tasks', JSON.stringify(tasks));
  }

  function toggleTheme() {
    isLight = !isLight;
    document.body.classList.toggle('light', isLight);
    document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  }

  function setPriority(level) {
    selectedPriority = level;
    document.getElementById('btn-high').className = 'priority-btn';
    document.getElementById('btn-medium').className = 'priority-btn';
    document.getElementById('btn-low').className = 'priority-btn';
    document.getElementById('btn-' + level).className = 'priority-btn active-' + level;
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, priority: selectedPriority, completed: false });
    input.value = '';
    saveTasks();
    renderTasks();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.completed = !task.completed;
    if (task.completed) showCelebration();
    saveTasks();
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    renderTasks();
  }

  function showCelebration() {
    document.getElementById('celebrationPopup').classList.add('show');
  }

  function closePopup() {
    document.getElementById('celebrationPopup').classList.remove('show');
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const pending = total - completed;
    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
    document.getElementById('totalCount').textContent = total;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('progressPercent').textContent = percent + '%';
    document.getElementById('progressFill').style.width = percent + '%';
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    updateStats();
    if (tasks.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No tasks yet. Add one above!</p></div>`;
      return;
    }
    list.innerHTML = tasks.map(task => `
      <div class="task-item">
        <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
          ${task.completed ? '✓' : ''}
        </div>
        <div class="task-content">
          <div class="task-text ${task.completed ? 'completed' : ''}">${task.text}</div>
          <div class="task-priority priority-${task.priority}">
            ${task.priority === 'high' ? '🔴 High Priority' : task.priority === 'medium' ? '🟡 Medium Priority' : '🟢 Low Priority'}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button>
      </div>
    `).join('');
  }

  document.getElementById('taskInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addTask();
  });

  renderTasks();
</script>

</body>
</html>
